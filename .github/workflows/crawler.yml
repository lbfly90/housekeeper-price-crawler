name: Housekeeper Price Crawler

on:
  # 手动触发
  workflow_dispatch:
  
  # 每周一早上8点自动运行
  schedule:
    - cron: '0 8 * * 1'

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pandas openpyxl
        playwright install chromium
        
    - name: Run crawler
      run: python crawler.py
      
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: price-data
        path: |
          data/*.json
          data/*.csv
        retention-days: 90
        
    - name: Commit results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --quiet && git diff --staged --quiet || git commit -m "Update price data [$(date +%Y-%m-%d)]"
        git push
